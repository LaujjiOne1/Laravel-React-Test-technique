version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: biloki_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biloki
      MYSQL_USER: biloki_user
      MYSQL_PASSWORD: biloki_pass
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - biloki_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biloki_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Biloki
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: biloki
      DB_USERNAME: root
      DB_PASSWORD: root
      SANCTUM_STATEFUL_DOMAINS: localhost:3000,127.0.0.1:3000
      SESSION_DRIVER: cookie
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/vendor
      - /app/bootstrap/cache
      - /app/storage
    networks:
      - biloki_network
    command: >
      sh -c "php artisan migrate --force &&
             php artisan seed:initial &&
             php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biloki_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - biloki_network
    environment:
      VITE_API_URL: http://localhost:8000

networks:
  biloki_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
